<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedFit</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="background"></div>

    <div class="container">

        <div class="card">

            <div class="logo">
                <div class="pulse"></div>
                <h1>MEDFIT</h1>
                <p>SISTEMA DA ACADEMIA</p>
            </div>

            <div class="inputBox">
                <label>USUÁRIO</label>
                <div class="input">
                    <span>👤</span>
                    <input type="text" id="usuario" placeholder="Digite seu usuário">
                </div>
            </div>

            <div class="inputBox">
                <label>SENHA</label>
                <div class="input">
                    <span>🔒</span>
                    <input type="password" id="senha" placeholder="Digite sua senha">
                </div>
            </div>

            <button onclick="login()">ENTRAR</button>

            <p class="footer">ACESSO RESTRITO</p>

        </div>

    </div>

    <script src="login.js"></script>

</body>
</html>
